name: Aktualizuj dane WIBOR

on:
  schedule:
    - cron: '0 19 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2t64 libatk1.0-0 libcups2 libdbus-1-3 libdrm2 libgbm1 libgtk-3-0 libnspr4 libnss3 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libxkbcommon0 libatspi2.0-0
      
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
      
      - name: Download WIBOR data
        run: python download_wibor.py
            
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add wibor_all.csv last_update.txt
          git diff --staged --quiet || git commit -m "Aktualizacja danych WIBOR $(date +'%Y-%m-%d')"
          git push
